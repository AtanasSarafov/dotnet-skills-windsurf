name: sync-upstream

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update upstream submodule to latest main
        id: submodule
        run: |
          git submodule update --remote upstream
          SHORT_SHA=$(git -C upstream rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Regenerate skills and rules
        run: python3 generator/generate.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request if changes detected
        id: create-pr
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync dotnet/skills @ ${{ steps.submodule.outputs.short_sha }}"
          branch: "sync/dotnet-skills-${{ steps.submodule.outputs.short_sha }}"
          title: "chore: sync dotnet/skills @ ${{ steps.submodule.outputs.short_sha }}"
          body: |
            Automated daily sync with upstream [dotnet/skills](https://github.com/dotnet/skills).

            **Upstream commit**: `${{ steps.submodule.outputs.short_sha }}`

            This PR is auto-merged by the `sync-upstream` workflow.
          labels: "sync"
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
